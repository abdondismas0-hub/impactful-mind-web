{% extends "base.html" %}
{% block content %}
<div class="container" style="margin-top: 50px; max-width: 800px;">
    <div class="card" style="padding: 20px; border-radius: 10px;">
        <h2 style="text-align: center; color: #2c3e50;">Andika Makala Mpya</h2>
        <hr>
        <form action="{{ url_for('add_post') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Kichwa cha Habari (Title)</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Maudhui ya Makala (Content)</label>
                <textarea name="content" class="form-control" rows="10" placeholder="Anza kuandika hapa..." required></textarea>
            </div>
            <div style="display: grid;">
                <button type="submit" class="btn btn-success" style="background-color: #2ecc71; border: none; padding: 10px;">Chapisha Makala (Publish)</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
