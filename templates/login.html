<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Impactful Mind</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Ingia kwenye Mfumo</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Jina la Mtumiaji (Username):</label>
                <input type="text" id="username" name="username" required placeholder="Andika username yako">
            </div>

            <div class="form-group">
                <label for="password">Nenosiri (Password):</label>
                <input type="password" id="password" name="password" required placeholder="Andika password yako">
            </div>

            <button type="submit" class="btn-login">Ingia Sasa</button>
        </form>
        
        <p><a href="{{ url_for('home') }}">Rudi Nyumbani</a></p>
    </div>
</body>
</html>
