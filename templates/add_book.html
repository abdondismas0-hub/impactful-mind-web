{% extends "base.html" %}
{% block content %}
<div class="container" style="margin-top: 50px; max-width: 600px;">
    <div class="card" style="padding: 20px; border-radius: 10px; shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #2c3e50;">Ongeza Kitabu Kipya</h2>
        <hr>
        <form action="{{ url_for('add_book') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Jina la Kitabu</label>
                <input type="text" name="title" class="form-control" placeholder="Ingiza jina la kitabu" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mwandishi</label>
                <input type="text" name="author" class="form-control" placeholder="Jina la mwandishi">
            </div>
            <div style="display: grid;">
                <button type="submit" class="btn btn-primary" style="background-color: #3498db; border: none;">Pakia Kitabu Sasa</button>
            </div>
        </form>
        <br>
        <a href="{{ url_for('admin_dashboard') }}" style="text-align: center; display: block; color: #7f8c8d;">Rudi Dashboard</a>
    </div>
</div>
{% endblock %}
